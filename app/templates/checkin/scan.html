{% extends "checkin/base.html" %}

{% block title %}Scan - Check-in{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl px-4 py-6 sm:px-6 lg:px-8" x-data="scannerApp()">

    <!-- Mode Toggle -->
    <div class="flex items-center justify-center gap-x-3 mb-4">
        <button @click="mode = 'camera'; startCamera()"
                :class="mode === 'camera' ? 'bg-green-600 text-white' : 'bg-white text-gray-700 ring-1 ring-gray-300'"
                class="rounded-lg px-4 py-2 text-sm font-medium transition-colors">
            <span class="flex items-center gap-x-1.5">
                <svg class="size-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6.827 6.175A2.31 2.31 0 0 1 5.186 7.23c-.38.054-.757.112-1.134.175C2.999 7.58 2.25 8.507 2.25 9.574V18a2.25 2.25 0 0 0 2.25 2.25h15A2.25 2.25 0 0 0 21.75 18V9.574c0-1.067-.75-1.994-1.802-2.169a47.865 47.865 0 0 0-1.134-.175 2.31 2.31 0 0 1-1.64-1.055l-.822-1.316a2.192 2.192 0 0 0-1.736-1.039 48.774 48.774 0 0 0-5.232 0 2.192 2.192 0 0 0-1.736 1.039l-.821 1.316Z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 12.75a4.5 4.5 0 1 1-9 0 4.5 4.5 0 0 1 9 0Z" />
                </svg>
                Camera
            </span>
        </button>
        <button @click="mode = 'manual'; stopCamera()"
                :class="mode === 'manual' ? 'bg-green-600 text-white' : 'bg-white text-gray-700 ring-1 ring-gray-300'"
                class="rounded-lg px-4 py-2 text-sm font-medium transition-colors">
            <span class="flex items-center gap-x-1.5">
                <svg class="size-4" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L10.582 16.07a4.5 4.5 0 0 1-1.897 1.13L6 18l.8-2.685a4.5 4.5 0 0 1 1.13-1.897l8.932-8.931Zm0 0L19.5 7.125M18 14v4.75A2.25 2.25 0 0 1 15.75 21H5.25A2.25 2.25 0 0 1 3 18.75V8.25A2.25 2.25 0 0 1 5.25 6H10" />
                </svg>
                Manual
            </span>
        </button>
    </div>

    <!-- Camera Scanner -->
    <div x-show="mode === 'camera'" x-cloak>
        <div class="overflow-hidden rounded-xl bg-black shadow-sm ring-1 ring-gray-900/5">
            <div id="qr-reader" class="w-full" style="min-height: 300px;"></div>
        </div>
        <p class="mt-2 text-center text-xs text-gray-500">Point camera at the QR code on the badge</p>
    </div>

    <!-- Manual Entry -->
    <div x-show="mode === 'manual'" x-cloak>
        <form @submit.prevent="submitManual()" class="rounded-xl bg-white p-4 shadow-sm ring-1 ring-gray-900/5">
            <label for="reference_input" class="block text-sm font-medium text-gray-900">Reference Number</label>
            <div class="mt-2 flex gap-x-3">
                <input type="text" id="reference_input" x-ref="referenceInput"
                       x-model="referenceNumber"
                       placeholder="e.g. BEE2025XXXXX"
                       class="block flex-1 rounded-lg bg-white px-3 py-2.5 text-base text-gray-900 outline outline-1 -outline-offset-1 outline-gray-300 placeholder:text-gray-400 focus:outline focus:outline-2 focus:-outline-offset-2 focus:outline-green-600 sm:text-sm"
                       autofocus>
                <button type="submit" :disabled="loading"
                        class="rounded-lg bg-green-600 px-4 py-2.5 text-sm font-semibold text-white shadow-sm hover:bg-green-500 disabled:opacity-50 disabled:cursor-not-allowed">
                    <span x-show="!loading">Check In</span>
                    <span x-show="loading" x-cloak>
                        <svg class="size-5 animate-spin" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
                        </svg>
                    </span>
                </button>
            </div>
        </form>
    </div>

    <!-- Result Display -->
    <div x-show="result" x-cloak x-transition class="mt-4">
        <div :class="result?.success ? 'bg-green-50 ring-green-200' : (result?.already_checked_in ? 'bg-yellow-50 ring-yellow-200' : 'bg-red-50 ring-red-200')"
             class="rounded-xl p-4 ring-1 shadow-sm">
            <div class="flex items-start gap-x-3">
                <template x-if="result?.success">
                    <svg class="size-8 shrink-0 text-green-500" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75 11.25 15 15 9.75M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                    </svg>
                </template>
                <template x-if="result?.already_checked_in">
                    <svg class="size-8 shrink-0 text-yellow-500" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m9-.75a9 9 0 1 1-18 0 9 9 0 0 1 18 0Zm-9 3.75h.008v.008H12v-.008Z" />
                    </svg>
                </template>
                <template x-if="!result?.success && !result?.already_checked_in">
                    <svg class="size-8 shrink-0 text-red-500" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m9.75 9.75 4.5 4.5m0-4.5-4.5 4.5M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z" />
                    </svg>
                </template>

                <div class="min-w-0 flex-1">
                    <p class="text-sm font-semibold"
                       :class="result?.success ? 'text-green-800' : (result?.already_checked_in ? 'text-yellow-800' : 'text-red-800')"
                       x-text="result?.message"></p>
                    <template x-if="result?.registration">
                        <div class="mt-1 flex items-center gap-x-2">
                            <span class="inline-flex items-center rounded-full px-1.5 py-0.5 text-[10px] font-medium"
                                  :class="result.registration.type === 'Attendee' ? 'bg-blue-100 text-blue-700' : 'bg-purple-100 text-purple-700'"
                                  x-text="result.registration.type"></span>
                            <span class="text-xs text-gray-600" x-text="result.registration.reference"></span>
                        </div>
                    </template>
                </div>
            </div>
        </div>
    </div>

    <!-- Quick Stats -->
    <div class="mt-6 flex items-center justify-center gap-x-6 text-center">
        <div>
            <p class="text-2xl font-bold text-green-600">{{ stats.total_checked_in }}</p>
            <p class="text-xs text-gray-500">Checked in</p>
        </div>
        <div class="h-8 w-px bg-gray-200"></div>
        <div>
            <p class="text-2xl font-bold text-gray-900">{{ stats.total_expected }}</p>
            <p class="text-xs text-gray-500">Expected</p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<script>
function scannerApp() {
    return {
        mode: 'camera',
        referenceNumber: '',
        result: null,
        loading: false,
        scanner: null,
        scanCooldown: false,

        init() {
            this.startCamera();
        },

        async startCamera() {
            await this.$nextTick();
            const readerEl = document.getElementById('qr-reader');
            if (!readerEl) return;

            if (this.scanner) {
                try { await this.scanner.stop(); } catch(e) {}
            }

            this.scanner = new Html5Qrcode('qr-reader');

            try {
                await this.scanner.start(
                    { facingMode: 'environment' },
                    { fps: 10, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 },
                    (decodedText) => this.onScanSuccess(decodedText),
                    () => {}
                );
            } catch (err) {
                console.warn('Camera not available, switching to manual mode');
                this.mode = 'manual';
            }
        },

        async stopCamera() {
            if (this.scanner) {
                try { await this.scanner.stop(); } catch(e) {}
            }
            this.$nextTick(() => {
                if (this.$refs.referenceInput) this.$refs.referenceInput.focus();
            });
        },

        async onScanSuccess(decodedText) {
            if (this.scanCooldown) return;
            this.scanCooldown = true;
            await this.doCheckin(decodedText, true);
            setTimeout(() => { this.scanCooldown = false; }, 2000);
        },

        async submitManual() {
            if (!this.referenceNumber.trim()) return;
            await this.doCheckin(this.referenceNumber.trim(), false);
            this.referenceNumber = '';
            if (this.$refs.referenceInput) this.$refs.referenceInput.focus();
        },

        async doCheckin(value, isQr) {
            this.loading = true;
            this.result = null;

            try {
                const csrfToken = document.querySelector('meta[name="csrf-token"]')?.content;
                const body = isQr ? { qr_data: value } : { reference: value };

                const res = await fetch('{{ url_for("checkin.api_scan") }}', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken,
                    },
                    body: JSON.stringify(body),
                });

                this.result = await res.json();
                this.playSound(this.result.success);
            } catch (err) {
                this.result = { success: false, message: 'Network error. Please try again.' };
            }

            this.loading = false;
            setTimeout(() => { this.result = null; }, 5000);
        },

        playSound(success) {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                gain.gain.value = 0.3;
                osc.frequency.value = success ? 800 : 300;
                osc.type = success ? 'sine' : 'square';
                osc.start();
                osc.stop(ctx.currentTime + 0.15);
            } catch(e) {}
        },

        destroy() {
            this.stopCamera();
        }
    }
}
</script>
{% endblock %}
