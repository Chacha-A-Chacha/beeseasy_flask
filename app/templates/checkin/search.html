{% extends "checkin/base.html" %}

{% block title %}Search - Check-in{% endblock %}

{% block content %}
<div class="mx-auto max-w-2xl px-4 py-6 sm:px-6 lg:px-8" x-data="searchApp()">

    <!-- Search Input -->
    <div class="relative">
        <div class="pointer-events-none absolute inset-y-0 left-0 flex items-center pl-3.5">
            <svg class="size-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
            </svg>
        </div>
        <input type="text" x-model="query" @input.debounce.300ms="doSearch()"
               placeholder="Search by name, email, or reference..."
               class="block w-full rounded-xl bg-white py-3 pl-10 pr-4 text-base text-gray-900 shadow-sm ring-1 ring-gray-300 placeholder:text-gray-400 focus:ring-2 focus:ring-green-600 sm:text-sm"
               autofocus>
    </div>

    <!-- Loading -->
    <div x-show="loading" x-cloak class="mt-6 text-center">
        <svg class="mx-auto size-6 animate-spin text-green-600" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
        </svg>
    </div>

    <!-- Results -->
    <div x-show="results !== null && !loading" x-cloak class="mt-4">
        <template x-if="results && results.length > 0">
            <ul class="divide-y divide-gray-100 rounded-xl bg-white shadow-sm ring-1 ring-gray-900/5">
                <template x-for="r in results" :key="r.id">
                    <li class="px-4 py-3">
                        <div class="flex items-center justify-between gap-x-3">
                            <div class="min-w-0 flex-1">
                                <a :href="'/checkin/registration/' + r.id" class="text-sm font-medium text-gray-900 hover:text-green-600" x-text="r.name"></a>
                                <div class="mt-0.5 flex flex-wrap items-center gap-x-2 gap-y-1">
                                    <span class="inline-flex items-center rounded-full px-1.5 py-0.5 text-[10px] font-medium"
                                          :class="r.type === 'Attendee' ? 'bg-blue-50 text-blue-700' : 'bg-purple-50 text-purple-700'"
                                          x-text="r.type"></span>
                                    <span class="text-xs text-gray-500" x-text="r.reference"></span>
                                    <template x-if="r.organization">
                                        <span class="text-xs text-gray-400" x-text="r.organization"></span>
                                    </template>
                                </div>
                            </div>

                            <!-- Check-in status / button -->
                            <template x-if="r.checked_in">
                                <span class="inline-flex items-center gap-x-1 rounded-full bg-green-50 px-2.5 py-1 text-xs font-medium text-green-700 ring-1 ring-inset ring-green-600/20">
                                    <svg class="size-3" viewBox="0 0 20 20" fill="currentColor">
                                        <path fill-rule="evenodd" d="M16.704 4.153a.75.75 0 0 1 .143 1.052l-8 10.5a.75.75 0 0 1-1.127.075l-4.5-4.5a.75.75 0 0 1 1.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 0 1 1.05-.143Z" clip-rule="evenodd" />
                                    </svg>
                                    Done
                                </span>
                            </template>
                            <template x-if="!r.checked_in">
                                <button @click="quickCheckin(r)"
                                        :disabled="r.checking_in"
                                        class="rounded-lg bg-green-600 px-3 py-1.5 text-xs font-semibold text-white shadow-sm hover:bg-green-500 disabled:opacity-50">
                                    <span x-show="!r.checking_in">Check In</span>
                                    <span x-show="r.checking_in" x-cloak>...</span>
                                </button>
                            </template>
                        </div>
                    </li>
                </template>
            </ul>
        </template>

        <template x-if="results && results.length === 0 && query.length >= 2">
            <div class="rounded-xl bg-white p-8 text-center shadow-sm ring-1 ring-gray-900/5">
                <svg class="mx-auto size-10 text-gray-300" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                </svg>
                <p class="mt-2 text-sm text-gray-500">No results found</p>
                <p class="text-xs text-gray-400">Try a different search term</p>
            </div>
        </template>
    </div>

    <!-- Empty State -->
    <div x-show="results === null && !loading" class="mt-8 text-center">
        <svg class="mx-auto size-12 text-gray-300" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
        </svg>
        <p class="mt-3 text-sm text-gray-500">Search for attendees and exhibitors</p>
        <p class="text-xs text-gray-400">Enter a name, email, or reference number</p>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
function searchApp() {
    return {
        query: '',
        results: null,
        loading: false,

        async doSearch() {
            if (this.query.trim().length < 2) {
                this.results = null;
                return;
            }

            this.loading = true;

            try {
                const res = await fetch('{{ url_for("checkin.api_search") }}?q=' + encodeURIComponent(this.query));
                const data = await res.json();
                this.results = data.results.map(r => ({ ...r, checking_in: false }));
            } catch (err) {
                this.results = [];
            }

            this.loading = false;
        },

        async quickCheckin(r) {
            r.checking_in = true;

            try {
                const csrfToken = document.querySelector('meta[name="csrf-token"]')?.content;
                const res = await fetch('{{ url_for("checkin.api_checkin_by_id", id=0) }}'.replace('0', r.id), {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-CSRFToken': csrfToken,
                    },
                });

                const data = await res.json();
                if (data.success || data.already_checked_in) {
                    r.checked_in = true;
                }
            } catch (err) {}

            r.checking_in = false;
        }
    }
}
</script>
{% endblock %}
