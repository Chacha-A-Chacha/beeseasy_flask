<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <title>{{ subject }}</title>
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    "Helvetica Neue", Arial, sans-serif;
                font-size: 16px;
                line-height: 1.6;
                color: #212529;
                background-color: #f8f9fa;
            }

            .email-wrapper {
                width: 100%;
                background-color: #f8f9fa;
                padding: 20px 0;
            }

            .email-container {
                max-width: 600px;
                margin: 0 auto;
                background-color: #ffffff;
                box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            }

            .email-header {
                background-color: #2c5f2d;
                color: #ffffff;
                padding: 40px 30px;
                text-align: center;
            }

            .email-header h1 {
                margin: 0 0 8px;
                font-size: 24px;
                font-weight: 600;
                line-height: 1.3;
            }

            .email-header p {
                margin: 0;
                font-size: 15px;
                opacity: 0.9;
            }

            .email-content {
                padding: 30px;
            }

            .email-content p {
                margin: 0 0 16px;
                color: #212529;
            }

            .email-footer {
                background-color: #f8f9fa;
                border-top: 1px solid #e9ecef;
                padding: 24px 30px;
                text-align: center;
                font-size: 13px;
                color: #6c757d;
            }

            .email-footer p {
                margin: 0 0 8px;
            }
        </style>
    </head>
    <body>
        <div class="email-wrapper">
            <div class="email-container">
                <div class="email-header">
                    <h1>{{ subject }}</h1>
                    <p>Pollination Africa Summit</p>
                </div>

                <div class="email-content">
                    <p>
                        Dear
                        <strong>{{ recipient_name }}</strong>,
                    </p>

                    {{ message_html|safe }}

                    <p style="margin-top: 24px">
                        Best regards,<br />
                        <strong>Pollination Africa Summit Team</strong>
                    </p>
                </div>

                <div class="email-footer">
                    <p>
                        This email was sent to {{ recipient_email }}
                        regarding the Pollination Africa Summit.
                    </p>
                </div>
            </div>
        </div>
    </body>
</html>
